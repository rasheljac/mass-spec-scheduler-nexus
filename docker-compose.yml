version: '3.8'

services:
  lab-management:
    build: .
    container_name: lab-management-system
    ports:
      # Randomized high host port to avoid conflicts with EasyPanel/other services.
      # Container still listens on 80 internally so EasyPanel's proxy can reach it.
      - "41783:80"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    labels:
      # Traefik labels (only used if you run Traefik separately)
      - "traefik.enable=true"
      - "traefik.http.routers.lab-management.rule=Host(`yourdomain.com`)"
      - "traefik.http.routers.lab-management.tls.certresolver=letsencrypt"
      - "traefik.http.services.lab-management.loadbalancer.server.port=80"

      # EasyPanel labels
      - "easypanel.domain=yourdomain.com"
      - "easypanel.ssl=true"

      # CapRover labels
      - "captain.scale=1"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
